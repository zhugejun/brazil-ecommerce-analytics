version: 2

models:
  - name: stg_olist__products
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: stg_olist__sellers
    columns: 
      - name: seller_id
        data_tests:
          - unique
          - not_null
  
  - name: stg_olist__customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
  
  - name: stg_olist__orders
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__customers')
                field: customer_id
  
  - name: stg_olist__order_items
    # data_tests:
    #   - dbt_utils.expression_is_true:
    #       arguments:
    #         expression: "price > 0"
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__products')
                field: product_id
      - name: seller_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__sellers')
                field: seller_id
      - name: price
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
  
  - name: stg_olist__payments
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id

  - name: stg_olist__reviews
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist__orders')
                field: order_id